<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.5"/>
  <!-- Accent lines -->
  <line x1="0" y1="4" x2="1200" y2="4" stroke="#22c55e" stroke-width="4"/>
  <line x1="0" y1="296" x2="1200" y2="296" stroke="#22c55e" stroke-width="4"/>
  <!-- Linux penguin simplified -->
  <g transform="translate(80, 80)">
    <ellipse cx="60" cy="70" rx="38" ry="50" fill="#c9d1d9" opacity="0.15"/>
    <ellipse cx="60" cy="65" rx="30" ry="35" fill="none" stroke="#c9d1d9" stroke-width="2" opacity="0.4"/>
    <circle cx="48" cy="55" r="4" fill="#c9d1d9" opacity="0.5"/>
    <circle cx="72" cy="55" r="4" fill="#c9d1d9" opacity="0.5"/>
    <ellipse cx="60" cy="68" rx="8" ry="5" fill="#f59e0b" opacity="0.5"/>
  </g>
  <!-- HTB badge -->
  <text x="600" y="120" font-family="'Courier New', monospace" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="4">HACK THE BOX</text>
  <!-- Title area -->
  <text x="600" y="175" font-family="'Courier New', monospace" font-size="48" fill="#c9d1d9" text-anchor="middle" font-weight="bold">WRITEUP</text>
  <!-- Difficulty badge -->
  <rect x="490" y="200" width="220" height="40" rx="6" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="227" font-family="'Courier New', monospace" font-size="20" fill="#22c55e" text-anchor="middle" font-weight="bold">EASY // LINUX</text>
  <!-- Corner decorations -->
  <path d="M 20 30 L 20 15 L 35 15" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <path d="M 1180 30 L 1180 15 L 1165 15" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <path d="M 20 270 L 20 285 L 35 285" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <path d="M 1180 270 L 1180 285 L 1165 285" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
</svg>
