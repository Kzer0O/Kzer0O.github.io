<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00cc33;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:1"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="keyGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Key icon -->
  <g transform="translate(12, 16)" filter="url(#keyGlow)">
    <!-- Key head (circle with hole) -->
    <circle cx="18" cy="24" r="14" fill="none" stroke="#00ff41" stroke-width="2.5"/>
    <circle cx="18" cy="24" r="5" fill="none" stroke="#00ff41" stroke-width="2"/>
    <!-- Key shaft -->
    <line x1="32" y1="24" x2="60" y2="24" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Key teeth -->
    <line x1="50" y1="24" x2="50" y2="32" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="56" y1="24" x2="56" y2="30" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Terminal prompt -->
  <text x="85" y="32" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" filter="url(#neon)">root@ctf:~$</text>
  <!-- Main text -->
  <text x="85" y="58" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="url(#glow)" filter="url(#neon)" letter-spacing="2">keyll0ger</text>
  <!-- Blinking cursor -->
  <rect x="365" y="38" width="16" height="26" fill="#00ff41" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Underline accent -->
  <line x1="85" y1="64" x2="380" y2="64" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
</svg>
