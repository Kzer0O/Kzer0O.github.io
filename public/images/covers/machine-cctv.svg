  <path d="M 20 28 L 20 14 L 34 14" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <path d="M 1180 28 L 1180 14 L 1166 14" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <path d="M 20 272 L 20 286 L 34 286" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <path d="M 1180 272 L 1180 286 L 1166 286" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
</svg>