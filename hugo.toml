baseURL = "https://keyll0ger.github.io/"
languageCode = "en-us"
title = "keyll0ger"
theme = "PaperMod"
paginate = 8
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  author = "keyll0ger"
  description = "Offensive Security | CTF Writeups | Red Team Notes"
  env = "production"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShareButtons = ["twitter", "reddit", "linkedin"]
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  UseHugoToc = true
  comments = false
  DateFormat = "2 January 2006"

  [params.profileMode]
    enabled = true
    title = "keyll0ger_"
    subtitle = """Offensive Security Enthusiast | CTF Player | CRTA Certified

Breaking boxes. Writing it up. Sharing the knowledge."""
    imageUrl = ""
    imageTitle = ""
    imageWidth = 120
    imageHeight = 120

    [[params.profileMode.buttons]]
      name = "Writeups"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "Tags"
      url = "/tags/"

    [[params.profileMode.buttons]]
      name = "About"
      url = "/about/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/keyll0ger"

  [[params.socialIcons]]
    name = "hackthebox"
    url = "https://app.hackthebox.com/"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true
    responsiveImages = false

  [params.editPost]
    URL = "https://github.com/keyll0ger/keyll0ger.github.io/tree/main/content"
    Text = "Suggest Edit"
    appendFilePath = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[[menu.main]]
  identifier = "writeups"
  name = "Writeups"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 40
